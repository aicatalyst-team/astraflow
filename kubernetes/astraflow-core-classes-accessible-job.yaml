apiVersion: batch/v1
kind: Job
metadata:
  name: astraflow-core-classes-accessible
  namespace: astraflow
  labels:
    app.kubernetes.io/name: astraflow
    app.kubernetes.io/component: astraflow
    app.kubernetes.io/managed-by: autopoc
    scenario: core-classes-accessible
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astraflow
        app.kubernetes.io/component: astraflow
        scenario: core-classes-accessible
    spec:
      containers:
        - name: astraflow
          image: quay.io/aicatalyst/astraflow-astraflow:latest
          imagePullPolicy: Always
          command: ["python"]
          args: ["-c", "from astraflow import AstraFlow, AstraFlowService, RolloutBuffer, DataAcquisition, DataServing, EvalManager; print('All core classes imported successfully')"]
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
