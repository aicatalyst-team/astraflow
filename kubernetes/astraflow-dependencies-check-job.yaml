apiVersion: batch/v1
kind: Job
metadata:
  name: astraflow-dependencies-check
  namespace: astraflow
  labels:
    app.kubernetes.io/name: astraflow
    app.kubernetes.io/component: astraflow
    app.kubernetes.io/managed-by: autopoc
    scenario: dependencies-check
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astraflow
        app.kubernetes.io/component: astraflow
        scenario: dependencies-check
    spec:
      containers:
        - name: astraflow
          image: quay.io/aicatalyst/astraflow-astraflow:latest
          imagePullPolicy: Always
          command: ["python"]
          args: ["-c", "import torch; import transformers; import ray; import hydra; print('torch:', torch.__version__); print('transformers:', transformers.__version__); print('ray:', ray.__version__)"]
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
